currently: >
  I am a graduate student in Coastal Sciences Division, School of Ocean
  Science and Engineering at the University of Southern Mississippi.
  My research focuses on flood risk assessment, evaluation of green
  stormwater infrastructure for stormwater management, and flood
  resilience planning in Moss Point, a Northern Gulf Coast city in
  Mississippi. I use hydrologic-hydraulic modeling, machine learning,
  geospatial analysis, and community engagement approaches to 
  understand flooding challenges and support coastal resilience.
